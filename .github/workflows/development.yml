name: "Development"

on:
  push:
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  test:
    name: Run tests

    strategy:
      matrix:
        python-version: [ "3.10", "3.11", "3.12", "3.13", "3.14" ]
        django-version: [ "4.2.*", "5.0.*", "5.1.*", "5.2.*", "6.0.*"]
        os: [ ubuntu-latest, macos-latest, windows-latest ]
        exclude:
          - python-version: "3.10"
            django-version: "6.0.*"
          - python-version: "3.11"
            django-version: "6.0.*"
          - python-version: "3.13"
            django-version: "4.2.*"
          - python-version: "3.13"
            django-version: "5.0.*"
          - python-version: "3.14"
            django-version: "4.2.*"
          - python-version: "3.14"
            django-version: "5.0.*"
          - python-version: "3.14"
            django-version: "5.1.*"
    defaults:
      run:
        shell: bash
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Python
        id: setup-python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install dependencies
        run: |
          uv sync --group dev

      - name: Install Django
        run: |
          uv pip install --upgrade django==${{ matrix.django-version }}

      - name: Install Task
        uses: arduino/setup-task@v2
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Run linters
        run: |
          uv run task lint

      - name: Get certifi CA bundle path
        id: certifi
        run: |
          echo "path=$(uv run python -m certifi)" >> "$GITHUB_OUTPUT"

      - name: Run unittests
        run: |
          uv run task coverage
        env:
          SSL_CERT_FILE: ${{ steps.certifi.outputs.path }}

      - name: Build wheels and source tarball
        run: |
          uv build

      - name: Check project build
        run: |
          uv run task build_check

      - uses: codecov/codecov-action@v6
        with:
          fail_ci_if_error: true
          files: coverage.xml
          token: ${{ secrets.CODECOV_TOKEN }}
